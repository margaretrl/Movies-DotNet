name: Upgrade

on:
  push:
    branches:
      - Upgrade_Assistant
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Upgrade .NET project
        run: |
          $targetFramework = "net9.0"
          Get-ChildItem -Path . -Filter *.csproj -Recurse | ForEach-Object {
            (Get-Content $_.FullName) -replace '<TargetFramework>.*?</TargetFramework>', "<TargetFramework>$targetFramework</TargetFramework>" | Set-Content $_.FullName
            $packages = Select-String -Path $_.FullName -Pattern '<PackageReference Include="(.*?)"' | ForEach-Object { $_.Matches.Groups[1].Value }
            foreach ($package in $packages) {
              dotnet add $_.FullName package $package
            }
          }
          dotnet build

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-commit: upgraded project to net9.0" || echo "No changes to commit"
          git push origin Upgrade_Assistant